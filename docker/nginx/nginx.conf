events { 
    worker_connections 1024; 
}

http {
    # Nginx default logging style aur mime types handler
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 1. Frontend Routing (Saare React web pages ke liye)
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. Backend API Routing (Saare FastAPI Python backend hits ke liye)
        location /api/ {
            proxy_pass http://backend:8000/; # Piche slash lagana zaroori hai taaki API url se '/api' clean ho sake
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}