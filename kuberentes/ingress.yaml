apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minijira-ingress
  annotations:
    # 👑 Yeh annotation lagana zaroori hai taaki Nginx ko pata chale ki hum regex use kar rahe hain
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx # 👑 Minikube ke Nginx class ko map karne ke liye
  rules:
    - http:
        paths:
          # 1. Frontend Routing (Normal Path - Prefix chalega)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          # 2. Backend API Routing (Regex Path - ImplementationSpecific zaroori hai)
          - path: /api/?(.*)
            pathType: ImplementationSpecific # 👑 HINDI: Prefix ko hata kar ye likh diya
            backend:
              service:
                name: backend
                port:
                  number: 8000